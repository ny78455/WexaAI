version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wexa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wexa
      POSTGRES_PASSWORD: wexapassword
      POSTGRES_DB: wexa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wexa -d wexa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wexa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wexa_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://wexa:wexapassword@postgres:5432/wexa_db
      DATABASE_URL_SYNC: postgresql://wexa:wexapassword@postgres:5432/wexa_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      DEBUG: "false"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wexa_celery_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://wexa:wexapassword@postgres:5432/wexa_db
      DATABASE_URL_SYNC: postgresql://wexa:wexapassword@postgres:5432/wexa_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wexa_celery_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://wexa:wexapassword@postgres:5432/wexa_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
    command: celery -A celery_app beat --loglevel=info

  flower:
    image: mher/flower:2.0
    container_name: wexa_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wexa_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
